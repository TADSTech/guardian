<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guardian Beta</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      color: #1f2937;
      background-color: #fffcf5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 12px;
    }
    .brand {
      font-weight: 900;
      letter-spacing: -0.05em;
      font-size: 1.2rem;
      color: #064e3b;
      text-transform: uppercase;
    }
    .badge {
      background: #dcefe3;
      color: #064e3b;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 9999px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status-icon {
      background: #22c55e;
      border-radius: 50%;
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }
    .status-text {
      font-size: 0.9rem;
      font-weight: 600;
      color: #166534;
    }
    .stats {
      font-size: 0.85rem;
      color: #4b5563;
      line-height: 1.5;
    }
    .stats span {
      font-weight: bold;
      color: #111827;
    }
    .warning {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-top: 12px;
      font-weight: 500;
    }
    .action-btn {
      display: block;
      width: 100%;
      background: #064e3b;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .action-btn:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: #0f172a;
    }
    .btn-outline {
      background: transparent;
      color: #064e3b;
      border: 1px solid #064e3b;
    }
    .btn-outline:hover {
      background: #f4f6f3;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">GUARDIAN</div>
    <div class="badge">COMPANION</div>
  </div>

  <div class="status" id="status-panel">
    <div class="status-icon" id="status-dot"></div>
    <div class="status-text" id="status-msg">Scanning page...</div>
  </div>

  <div class="stats">
    This page has been reviewed by Guardian's safety module.<br><br>
    Threats blocked today: <span id="threats-count">0</span><br>
    Connected to: <span>Family Dashboard</span>
  </div>

  <div class="warning">
    <strong>Elderly & Focus tools:</strong> Click the green shield button on the bottom right of the page for full inline controls, or toggle modes below.
  </div>

  <button class="action-btn" id="elderly-btn">
    <span style="display:inline-flex;align-items:center;gap:6px;justify-content:center;width:100%;">
      <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Toggle Elderly Mode
    </span>
  </button>
  <button class="action-btn btn-secondary" id="focus-btn">
    <span style="display:inline-flex;align-items:center;gap:6px;justify-content:center;width:100%;">
      <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Toggle Focus Mode
    </span>
  </button>
  <button class="action-btn btn-outline" id="scan-btn">Force Re-scan Page</button>

  <script src="popup.js"></script>
</body>
</html>
